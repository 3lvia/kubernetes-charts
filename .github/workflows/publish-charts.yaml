name: Publish Helm charts

on:
  push:
    branches: [master]

env:
  CHART_URL: 'oci://ghcr.io/${{ github.repository_owner }}/charts'

jobs:
  package-release-chart:
    name: "Package and release Helm chart '${{ matrix.chart-name }}'"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart-name:
          - elvia-deployment
          - elvia-statefulset
          - elvia-job
          - iss-deployment
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version
        run: |
          version=$(cat "charts/$CHART_NAME/Chart.yaml" | yq -r '.version')
          echo "VERSION_TAG=$CHART_NAME-$version" >> "$GITHUB_ENV"
        env:
          CHART_NAME: ${{ matrix.chart-name }}

      - name: Check if new version has been released
        id: check-release
        run: |
          latest_version=$(gh release list --json name -q ".[] | select(.name == \"$VERSION_TAG\") | .name")
          if [[ "$latest_version" == "$VERSION_TAG" ]]; then
            echo "Version already released."
            echo 'already-released=true' >> "$GITHUB_OUTPUT"
            exit 0
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release if new version
        if: ${{ steps.check-release.outputs.already-released != 'true' }}
        run: |
          gh release create \
            "$VERSION_TAG" \
            --latest \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if chart already exists
        id: check-chart
        run: |
          if helm show chart \
            "$CHART_URL/$CHART_NAME" \
            --version "$VERSION" > /dev/null 2>&1; then
            echo "Chart version already exists. Skipping chart release."
            echo 'already-released=true' >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Login to GHCR
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: echo "$REGISTRY_PASSWORD" | helm registry login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
        env:
          REGISTRY: 'ghcr.io'
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Create temp directory
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: echo "HELM_TEMP_DIR=$(mktemp -d)" >> "$GITHUB_ENV"

      - name: Package chart
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: |
          cd "$HELM_TEMP_DIR"
          helm package "$GITHUB_WORKSPACE/charts/$CHART_NAME"
        env:
          CHART_NAME: ${{ matrix.chart-name }}

      - name: Push chart
        if: ${{ steps.check-chart.outputs.already-released != 'true' }}
        run: |
          cd "$HELM_TEMP_DIR"
          helm push $CHART_NAME-*.tgz "$CHART_URL"
        env:
          CHART_NAME: ${{ matrix.chart-name }}
